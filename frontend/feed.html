<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snapora — Feed</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/dark-mode.css">
</head>
<body>
<!-- Desktop Sidebar -->
<nav class="sidebar">
  <div class="sidebar-logo"><span>Snapora</span></div>
  <div class="sidebar-nav">
    <a class="nav-item active" href="feed.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a class="nav-item" href="explore.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Explore</span>
    </a>
    <a class="nav-item" href="reels.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      <span>Reels</span>
    </a>
    <a class="nav-item" href="notifications.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span>Notifications</span>
      <span class="badge hidden notif-badge"></span>
    </a>
    <button class="nav-item" id="create-post-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span>Create</span>
    </button>
    <a class="nav-item" id="profile-nav-link" href="profile.html">
      <img class="avatar avatar-sm nav-user-avatar" src="" alt="Profile">
      <span class="nav-username"></span>
    </a>
  </div>
  <div class="sidebar-user">
    <button class="nav-item logout-btn" style="width:100%">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>Log out</span>
    </button>
  </div>
</nav>

<!-- Mobile Top Header -->
<header class="top-header">
  <div class="logo"><span>Snapora</span></div>
  <div class="header-actions">
    <a href="notifications.html" style="position:relative">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="badge hidden notif-badge" style="top:0;right:0"></span>
    </a>
  </div>
</header>

<div class="main-content">
  <div class="content-wrapper">
    <div class="feed-layout">
      <div class="feed-column">
        <!-- Stories -->
        <div class="stories-bar" id="stories-bar">
          <div class="skeleton" style="width:60px;height:60px;border-radius:50%"></div>
          <div class="skeleton" style="width:60px;height:60px;border-radius:50%"></div>
          <div class="skeleton" style="width:60px;height:60px;border-radius:50%"></div>
        </div>
        <!-- Feed Posts -->
        <div id="feed-posts"></div>
        <div id="feed-sentinel" style="height:1px"></div>
      </div>

      <!-- Right sidebar -->
      <aside class="sidebar-right">
        <div class="current-user-row">
          <img class="avatar avatar-md nav-user-avatar" src="" alt="">
          <div class="current-user-info">
            <div class="username nav-username"></div>
            <div class="fullname" style="font-size:12px;color:var(--text-secondary)"></div>
          </div>
          <a class="switch-link" href="profile.html">Switch</a>
        </div>
        <div class="suggested-section">
          <div class="suggested-header">
            <h3>Suggested For You</h3>
            <a href="explore.html">See All</a>
          </div>
          <div id="suggested-users"></div>
        </div>
        <p style="font-size:11px;color:var(--text-secondary);margin-top:20px">© 2024 Snapora</p>
        <button id="dark-mode-toggle" class="btn btn-outline btn-sm" style="margin-top:8px">🌙</button>
      </aside>
    </div>
  </div>
</div>

<!-- Mobile Bottom Nav -->
<nav class="bottom-nav">
  <a class="bottom-nav-item active" href="feed.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
  </a>
  <a class="bottom-nav-item" href="explore.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </a>
  <button class="bottom-nav-item" id="create-post-btn-mobile">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
  </button>
  <a class="bottom-nav-item" href="reels.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
  </a>
  <a class="bottom-nav-item" href="profile.html">
    <img class="avatar avatar-sm nav-user-avatar" src="" alt="">
  </a>
</nav>

<!-- Create Post Modal -->
<div id="create-post-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span>Create new post</span>
      <button id="close-create-modal">✕</button>
    </div>
    <div class="modal-body">
      <div id="upload-area" class="upload-area">
        <div class="upload-icon">🖼️</div>
        <p>Drag and drop an image here or <strong>click to browse</strong></p>
        <input type="file" id="post-file-input" accept="image/*" class="hidden">
      </div>
      <div id="image-preview" class="image-preview hidden">
        <img id="preview-img" src="" alt="Preview">
        <button id="remove-image" class="remove-image">✕</button>
      </div>
      <div class="input-group">
        <textarea class="input-field" id="post-caption" placeholder="Write a caption…" maxlength="2200" rows="3"></textarea>
        <div class="char-counter"><span id="caption-counter">0</span>/2200</div>
      </div>
      <div class="input-group">
        <input class="input-field" id="post-location" type="text" placeholder="Add location (optional)">
      </div>
      <button class="btn btn-primary" style="width:100%" id="share-post-btn">Share</button>
    </div>
  </div>
</div>

<div class="toast"></div>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/components.js"></script>
<script src="js/stories.js"></script>
<script src="js/feed.js"></script>
<script src="js/app.js"></script>
<script>
  // Wire up mobile create btn
  document.getElementById('create-post-btn-mobile')?.addEventListener('click', () => {
    document.getElementById('create-post-modal').classList.remove('hidden');
  });
  // Set profile link
  const u = Auth.getUser();
  if (u) document.getElementById('profile-nav-link').href = `profile.html?u=${u.username}`;
</script>
</body>
</html>
