spring.datasource.url=jdbc:mysql://localhost:3306/snapora?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.jwt.secret=${JWT_SECRET:snapora-super-secret-jwt-key-min-32-characters-long}
app.jwt.expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000
app.upload.dir=uploads
server.port=8080
